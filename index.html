<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HAMSA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared.css" />
  <style>
    body.landing-body { overflow: hidden; }
    .landing-shell {
      position: relative; width: 100vw; height: 100vh;
      display: flex; align-items: center; justify-content: center; overflow: hidden;
      background: radial-gradient(ellipse at 60% 40%, rgba(255,43,84,.09) 0%, transparent 55%),
                  linear-gradient(180deg, #050505 0%, #09090b 100%);
    }
    .hero-grid {
      position: absolute; inset: 0;
      background-image: linear-gradient(rgba(255,43,84,.06) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(255,43,84,.06) 1px, transparent 1px);
      background-size: 60px 60px;
      mask-image: radial-gradient(ellipse at center, black 30%, transparent 75%);
    }
    .hero-noise {
      position: absolute; inset: 0; opacity: .025;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      pointer-events: none;
    }
    #heroGlow {
      position: fixed; width: 420px; height: 420px; border-radius: 50%;
      background: radial-gradient(circle, rgba(255,43,84,.16) 0%, rgba(255,43,84,.06) 38%, transparent 70%);
      filter: blur(32px); pointer-events: none; transform: translate(-50%,-50%);
      left: 50%; top: 50%; z-index: 0; transition: left .06s, top .06s;
    }
    .landing-content {
      position: relative; z-index: 1; text-align: center;
      display: flex; flex-direction: column; align-items: center;
    }
    .landing-topline {
      font-size: .78rem; font-weight: 500; letter-spacing: .3em;
      text-transform: uppercase; color: var(--red); margin-bottom: 1.4rem;
      opacity: 0; animation: fadeUp .6s .1s ease forwards;
    }
    .landing-title {
      font-family: 'Syne', sans-serif; font-weight: 800;
      font-size: clamp(4.5rem, 16vw, 12rem); line-height: .9;
      letter-spacing: -.03em; color: var(--text); position: relative;
      user-select: none; opacity: 0; animation: fadeUp .65s .22s ease forwards;
    }
    .landing-title span:first-child { display: block; }
    .landing-title span:last-child {
      display: block; position: absolute; inset: 0; color: transparent;
      -webkit-text-stroke: 1px rgba(255,43,84,.25);
      transform: translate(4px, 4px); pointer-events: none;
    }
    .landing-subtitle {
      font-size: 1rem; font-weight: 300; color: var(--muted); letter-spacing: .05em;
      margin-top: 1.8rem; opacity: 0; animation: fadeUp .65s .34s ease forwards;
    }
    .enter-button {
      display: inline-flex; align-items: center; gap: .55rem;
      margin-top: 2.6rem; padding: .85rem 2rem;
      background: var(--red); color: #fff;
      font-family: 'Syne', sans-serif; font-weight: 700;
      font-size: .88rem; letter-spacing: .1em; text-transform: uppercase;
      border-radius: 99px; opacity: 0; animation: fadeUp .65s .46s ease forwards;
      transition: background .2s, transform .2s, box-shadow .2s;
      box-shadow: 0 0 28px rgba(255,43,84,.35);
    }
    .enter-button:hover { background: #ff1a44; transform: translateY(-2px); box-shadow: 0 0 40px rgba(255,43,84,.5); }
    .enter-button::after { content: '→'; }
    #main-nav { background: transparent; border-bottom: none; }
    #main-footer { display: none; }
  </style>
</head>
<body class="landing-body">
  <main class="landing-shell">
    <div class="hero-grid"></div>
    <div class="hero-noise"></div>
    <div id="heroGlow"></div>
    <section class="landing-content">
      <p class="landing-topline">Hi, I am</p>
      <h1 class="landing-title" id="heroTitle">
        <span>HAMSA</span>
        <span>HAMSA</span>
      </h1>
      <p class="landing-subtitle">Welcome to my digital corner.</p>
      <a href="home.html" class="enter-button">Learn more about me</a>
    </section>
  </main>
  <script src="shared.js"></script>
</body>
</html>
