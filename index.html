<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HAMSA</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --red: #ff2b54;
      --bg: #050505;
      --bg-soft: #09090b;
      --text: #f3f3f5;
      --text-soft: #c8c8d0;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .landing-shell {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background:
        radial-gradient(ellipse at 60% 40%, rgba(255, 43, 84, 0.10) 0%, transparent 55%),
        radial-gradient(ellipse at 20% 80%, rgba(255, 43, 84, 0.05) 0%, transparent 40%),
        linear-gradient(180deg, var(--bg) 0%, var(--bg-soft) 100%);
    }

    .hero-grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255, 43, 84, 0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 43, 84, 0.06) 1px, transparent 1px);
      background-size: 60px 60px;
      -webkit-mask-image: radial-gradient(ellipse at center, black 28%, transparent 72%);
      mask-image: radial-gradient(ellipse at center, black 28%, transparent 72%);
      pointer-events: none;
    }

    .hero-noise {
      position: absolute;
      inset: 0;
      opacity: 0.025;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      pointer-events: none;
    }

    #heroGlow {
      position: fixed;
      width: 420px;
      height: 420px;
      border-radius: 50%;
      background: radial-gradient(
        circle,
        rgba(255, 43, 84, 0.16) 0%,
        rgba(255, 43, 84, 0.06) 35%,
        transparent 70%
      );
      filter: blur(34px);
      pointer-events: none;
      transform: translate(-50%, -50%);
      left: 50%;
      top: 50%;
      z-index: 1;
      transition: left 0.08s ease, top 0.08s ease;
    }

    .landing-content {
      position: relative;
      z-index: 2;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 1.5rem;
      max-width: 900px;
    }

    .landing-topline {
      font-size: 0.76rem;
      font-weight: 500;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: var(--red);
      margin-bottom: 1.4rem;
      opacity: 0;
      animation: landingFade 0.6s 0.12s ease forwards;
    }

    .landing-title {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: clamp(3.2rem, 10vw, 7rem);
      line-height: 0.95;
      letter-spacing: -0.02em;
      color: var(--text);
      position: relative;
      user-select: none;
      opacity: 0;
      animation: landingFade 0.7s 0.24s ease forwards;
      will-change: transform;
    }

    .landing-title .t-solid {
      display: block;
      position: relative;
      z-index: 1;
    }

    .landing-title .t-ghost {
      display: block;
      position: absolute;
      inset: 0;
      color: transparent;
      -webkit-text-stroke: 1px rgba(255, 43, 84, 0.24);
      transform: translate(4px, 4px);
      pointer-events: none;
      z-index: 0;
    }

    .landing-subtitle {
      font-size: 1rem;
      font-weight: 300;
      color: var(--text-soft);
      letter-spacing: 0.06em;
      margin-top: 1.5rem;
      opacity: 0;
      animation: landingFade 0.65s 0.38s ease forwards;
    }

    .enter-button {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      margin-top: 2.4rem;
      padding: 0.9rem 2rem;
      background: var(--red);
      color: #ffffff;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.82rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      text-decoration: none;
      border-radius: 999px;
      opacity: 0;
      animation: landingFade 0.65s 0.52s ease forwards;
      transition: background 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
      box-shadow: 0 0 28px rgba(255, 43, 84, 0.35);
    }

    .enter-button:hover {
      background: #ff1a44;
      transform: translateY(-3px);
      box-shadow: 0 0 42px rgba(255, 43, 84, 0.5);
    }

    .enter-button .arrow {
      font-size: 1rem;
      transition: transform 0.2s ease;
    }

    .enter-button:hover .arrow {
      transform: translateX(3px);
    }

    @keyframes landingFade {
      from {
        opacity: 0;
        transform: translateY(18px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 640px) {
      #heroGlow {
        width: 300px;
        height: 300px;
      }

      .landing-topline {
        font-size: 0.7rem;
        margin-bottom: 1.1rem;
      }

      .landing-subtitle {
        font-size: 0.92rem;
        margin-top: 1.2rem;
      }

      .enter-button {
        margin-top: 2rem;
        padding: 0.85rem 1.4rem;
        font-size: 0.74rem;
      }

      .landing-title .t-ghost {
        transform: translate(3px, 3px);
      }
    }
  </style>
</head>
<body>
  <div class="landing-shell">
    <div class="hero-grid"></div>
    <div class="hero-noise"></div>
    <div id="heroGlow"></div>

    <section class="landing-content">
      <p class="landing-topline">Hi, I am</p>

      <h1 class="landing-title" id="heroTitle">
        <span class="t-solid">HAMSA</span>
        <span class="t-ghost">HAMSA</span>
      </h1>

      <p class="landing-subtitle">Welcome to my digital corner.</p>

      <a href="home.html" class="enter-button">
        Learn more about me
        <span class="arrow">→</span>
      </a>
    </section>
  </div>

  <script>
    const glow = document.getElementById('heroGlow');
    const title = document.getElementById('heroTitle');

    document.addEventListener('mousemove', (e) => {
      glow.style.left = e.clientX + 'px';
      glow.style.top = e.clientY + 'px';

      const dx = (window.innerWidth / 2 - e.clientX) / 65;
      const dy = (window.innerHeight / 2 - e.clientY) / 65;
      title.style.transform = `translate(${-dx}px, ${-dy}px)`;
    });
  </script>
</body>
</html>
